name: Automatic Compilation (Windows, Mac, Linux)

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: ${{ matrix.os }} Compiling
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Download Codes
        uses: actions/checkout@v4

      - name: Install Python 3.10+
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.13'

      - name: Install the necessary Linux libraries.
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install Python Packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          pip install pillow

      - name: Compile Folder with PyInstaller
        run: |
          pyinstaller --noconfirm --onedir --windowed --icon="icon.png" --name="YGO Custom Database Creator" main.py

      - name: Compile Portable with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed --icon="icon.png" --name="YGO Custom Database Creator" main.py

      - name: Convert outputs to Zip format.(Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist\* -DestinationPath YGO-CustomDatabaseCreator-Windows.zip

      - name: Convert outputs to Tar.gz format. (Mac & Linux)
        if: runner.os != 'Windows'
        run: tar -czvf YGO-CustomDatabaseCreator-${{ runner.os }}.tar.gz -C dist .

      - name: Upload to GitHub Releases section
        uses: softprops/action-gh-release@v2
        with:
          files: |
            YGO-CustomDatabaseCreator-Windows.zip
            YGO-CustomDatabaseCreator-*.tar.gz
            dist/YGO Custom Database Creator.exe
            dist/YGO Custom Database Creator
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
